# https://goreleaser.com/customization
#
# The project / repo / brew formula are all named `sandboxd`; the binary it
# installs is `boxd`. See README for the rationale (think `brew install
# aws-cli` installing the `aws` binary).
#
# Release pipeline status: tag-push CI (.github/workflows/release.yml) calls
# `goreleaser release --clean`, but Homebrew tap publication still depends on
# the kevbot-git/homebrew-sandboxd repo existing and the
# HOMEBREW_TAP_GITHUB_TOKEN repo secret being set. For day-to-day development
# use plain `go build ./cmd/boxd`; to verify the build pipeline locally use
# `goreleaser release --snapshot --clean`.
version: 2

project_name: sandboxd

before:
  hooks:
    - go mod tidy

builds:
  - id: sandboxd
    main: ./cmd/boxd
    binary: boxd
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/kevbot-git/sandboxd/cmd.version={{ .Version }}

archives:
  - id: sandboxd
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

# Homebrew tap publication — disabled implicitly until the tap repo
# exists. Once kevbot-git/homebrew-sandboxd is created and the release
# workflow runs against a tag, this section will start publishing
# `Formula/sandboxd.rb` to that tap. The formula installs a binary called
# `boxd` (see `install:` below).
brews:
  - name: sandboxd
    repository:
      owner: kevbot-git
      name: homebrew-sandboxd
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    homepage: https://github.com/kevbot-git/sandboxd
    description: Sandbox-kit installer and runner for sbx
    license: Apache-2.0
    install: |
      bin.install "boxd"
    test: |
      system "#{bin}/boxd --version"
